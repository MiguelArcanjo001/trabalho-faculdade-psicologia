<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Inicial</title>
    <link rel="stylesheet" href="Telainicial.css">
</head>
<body >
    <section class="TelaInicial">
        <header>
            <h3>Tela Inicial</h3>
        </header>
    </section>

    <section class="Formulario">
        <div class="DivForms">
            <form action="">

                <label for="Cidade" class="label">digite sua cidade:</label>
                <input type="text" id="Cidade" name="Cidade" placeholder="Digite sua cidade">
                <br>
                <label for="Endereco" class="label">Qual seu endereço?:</label  >
                <input type="text" id="Endereco" name="Endereco" placeholder="Digite seu endereço">
                <br>
                <label for="Email" class="label">Onde você quer ir?:</label >
                <input type="email" id="Fim" name="Fim" placeholder="Digite aonde voce quer ir">
                <br>
                <label for="CPF" class="label">Digite seu CPF: </label >
                <input type="text" id="CPF" name="CPF" placeholder="Digite seu CPF">
                <br>
                <label for="Parada" class="label">Digite sua parada:</label>
                <input type="text" id="Parada" name="Parada" placeholder="Digite sua parada">
                <br>
                <label for="Onibus" class="label">Qual ônibus você vai pegar?:</label>
                <input type="text" id="Onibus" name="Onibus" placeholder="Digite o ônibus">
                <br>
                <label for="Ass" class="label">Voce possui alguma defiencia?</label>
                <button type="button">Sim</button>
                <button type="button">Não</button> 
                <br>
                <label for="Pagamento" class="label">Qual seu metodo de pagamento?</label>
                <button class="Pagamento" type="button">Cartaõ de credito</button>
                <button class="Pagamento" type="button">Cartão de debito</button>
                <button class="Pagamento" type="button">Dinheiro</button>
                <button class="Pagamento" type="button">PIX</button>
                <button class="Pagamento" type="button">VEM</button>
            </form>

            <button class="continuarBTN" type="button">Ver meu onibus</button>

        </div>
    </section>
    <script src="Logica.js"></script>
</body>
</html>
